name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-vst3:
    name: Windows VST3
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-windows -G "Visual Studio 17 2022" -A x64
          -DSLAMMIN_TUNER_FORMATS=VST3
          -DSLAMMIN_TUNER_USE_OPENGL=ON
          -DSLAMMIN_TUNER_STRICT_WARNINGS=ON

      - name: Build
        shell: pwsh
        run: cmake --build build-windows --config Release --target SlamminTunerV1_VST3 --parallel

      - name: Package
        shell: pwsh
        run: |
          $component = Get-ChildItem -LiteralPath build-windows -Recurse -Directory -Filter 'Slammin Tuner.vst3' |
            Where-Object { $_.FullName -like '*\VST3\*' } |
            Select-Object -First 1
          if (-not $component) { throw 'Slammin Tuner VST3 bundle was not found.' }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $zip = Join-Path (Resolve-Path artifacts) 'Slammin-Tuner-v1.1.6-Windows-VST3.zip'
          Compress-Archive -LiteralPath $component.FullName -DestinationPath $zip -Force
          Get-ChildItem -LiteralPath $zip | Format-List FullName,Length

      - uses: actions/upload-artifact@v5
        with:
          name: Slammin-Tuner-v1.1.6-Windows-VST3
          path: artifacts/Slammin-Tuner-v1.1.6-Windows-VST3.zip

  macos-au:
    name: macOS AU Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
          ninja --version
          xcrun clang++ --version

      - name: Platform guard audit
        run: python3 scripts/audit_platform_guards.py

      - name: Configure AU universal
        run: |
          cmake -S . -B build-macos-au -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSLAMMIN_TUNER_FORMATS=AU \
            -DSLAMMIN_TUNER_USE_OPENGL=OFF \
            -DSLAMMIN_TUNER_STRICT_WARNINGS=ON

      - name: Build AU universal
        run: cmake --build build-macos-au --config Release --target SlamminTunerV1_AU --parallel 3 --verbose

      - name: Validate AU
        run: |
          COMPONENT="build-macos-au/src/strobe_tuner/SlamminTunerV1_artefacts/Release/AU/Slammin Tuner.component"
          test -d "${COMPONENT}"
          codesign --force --deep --sign - "${COMPONENT}"
          plutil -lint "${COMPONENT}/Contents/Info.plist"
          lipo "${COMPONENT}/Contents/MacOS/Slammin Tuner" -verify_arch arm64 x86_64
          lipo -info "${COMPONENT}/Contents/MacOS/Slammin Tuner"
          xcrun vtool -show-build "${COMPONENT}/Contents/MacOS/Slammin Tuner"
          mkdir -p "${HOME}/Library/Audio/Plug-Ins/Components"
          rm -rf "${HOME}/Library/Audio/Plug-Ins/Components/Slammin Tuner.component"
          cp -R "${COMPONENT}" "${HOME}/Library/Audio/Plug-Ins/Components/"
          killall -9 AudioComponentRegistrar >/dev/null 2>&1 || true
          auval -v aufx ST26 SLMN
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "${COMPONENT}" artifacts/Slammin-Tuner-v1.1.6-macOS-AU-universal.zip

      - uses: actions/upload-artifact@v5
        with:
          name: Slammin-Tuner-v1.1.6-macOS-AU-universal
          path: artifacts/Slammin-Tuner-v1.1.6-macOS-AU-universal.zip

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - windows-vst3
      - macos-au
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Slammin Tuner ${GITHUB_REF_NAME#v}" \
              --notes-file docs/release-v1.1.6.md
            gh release upload "${GITHUB_REF_NAME}" --clobber release-artifacts/*.zip
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Slammin Tuner ${GITHUB_REF_NAME#v}" \
              --notes-file docs/release-v1.1.6.md \
              release-artifacts/*.zip
          fi
